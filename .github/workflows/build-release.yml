# Cross-platform build + release workflow.
#
# WHEN IT RUNS
#   * Push of a tag matching `v*` (e.g. `v1.0.0`) → builds all 3 platforms
#     and creates a DRAFT GitHub Release with the artifacts attached. You
#     then review the draft in the Releases UI and click "Publish".
#   * Manual trigger (Actions tab → "Build & Release" → "Run workflow") →
#     builds all 3 platforms and uploads them as workflow artifacts only
#     (no Release created). Useful to smoke-test the pipeline.
#
# WHY THE MATRIX
#   electron-builder must run on the target OS to produce a working bundle.
#   Cross-compiling Windows → macOS notoriously breaks the Electron Framework
#   Mach-O slice. macOS-latest builds both x64 and arm64 in one shot via the
#   `arch` array already set in package.json's `build.mac.target`.

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required so the release job can create / update GitHub Releases.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: build:mac
            artifact_name: macos
            artifact_paths: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/*.yml
          - os: windows-latest
            build_script: build:win
            artifact_name: windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/*.yml
          - os: ubuntu-22.04
            build_script: build:linux
            artifact_name: linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache the Electron binary + electron-builder downloads. Each fresh
      # runner would otherwise re-download ~150 MB of Electron + ~50 MB of
      # builder helpers per platform per build.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ matrix.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ matrix.os }}-electron-

      - name: Install dependencies
        run: npm ci

      # Linux: rpm packaging needs `rpm`/`rpmbuild`; AppImage's appimagetool
      # needs libfuse2. Neither ships on the bare runner — install both.
      - name: Install Linux packaging deps
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y rpm libfuse2

      - name: Build
        env:
          # electron-builder reads GH_TOKEN to detect the publish provider.
          # We're NOT auto-publishing from inside the build (the dedicated
          # release job below handles that), so this just suppresses the
          # "no token" warning electron-builder emits otherwise.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip electron-builder's auto-publish step regardless of the
          # `publish` config in package.json — we collect artifacts via
          # the upload step instead, then the release job decides.
          PUBLISH_FOR_PULL_REQUEST: 'true'
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FLUX-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

  # Release job — only runs when triggered by a `v*` tag push. Pulls the
  # artifacts from the three platform jobs and attaches them to a draft
  # GitHub Release named after the tag. Draft = nothing is public yet;
  # you review in the Releases UI and click "Publish release" manually.
  release:
    name: Create draft Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (debug)
        run: find artifacts -type f -printf '%p (%s bytes)\n' | sort

      - name: Create draft Release
        uses: softprops/action-gh-release@v2
        with:
          # Flatten artifacts/<platform>/<file> → just <file> in the release
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.blockmap
            artifacts/**/*.yml
          draft: true
          generate_release_notes: true
          name: FLUX Hub ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
